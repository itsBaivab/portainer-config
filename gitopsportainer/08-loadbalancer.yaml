apiVersion: v1
kind: Service
metadata:
  name: url-shortener-loadbalancer
  namespace: url-shortener
  labels:
    app: url-shortener
    managed-by: portainer
spec:
  type: LoadBalancer
  selector:
    app: nginx-gateway
  ports:
    - port: 80
      targetPort: 80
      name: http
    - port: 8080
      targetPort: 80
      name: frontend
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-loadbalancer
  namespace: url-shortener
  labels:
    app: frontend
    managed-by: portainer
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 80
      name: http
  sessionAffinity: None
---

