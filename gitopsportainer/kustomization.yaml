apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: url-shortener-gitops
  namespace: url-shortener

resources:
  - 00-namespace.yaml
  - 01-postgres-config.yaml
  - 02-postgres.yaml
  - 03-link-service.yaml
  - 04-redirect-service.yaml
  - 05-stats-service.yaml
  - 06-nginx-gateway.yaml
  - 07-frontend.yaml
  - 08-loadbalancer.yaml

commonLabels:
  app.kubernetes.io/name: url-shortener
  app.kubernetes.io/instance: gitops
  app.kubernetes.io/managed-by: portainer

namespace: url-shortener

images:
  - name: itsbaivab/url-shortener-link
    newTag: latest
  - name: itsbaivab/url-shortener-redirect
    newTag: latest
  - name: itsbaivab/url-shortener-stats
    newTag: latest
  - name: itsbaivab/url-shortener-frontend
    newTag: latest

replicas:
  - name: link-service
    count: 2
  - name: redirect-service
    count: 2
  - name: stats-service
    count: 2
  - name: nginx-gateway
    count: 2
  - name: frontend
    count: 2

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - DB_MAX_CONNECTIONS=100
      - CACHE_TTL=3600

patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: link-service
      namespace: url-shortener
    spec:
      template:
        spec:
          containers:
          - name: link-service
            env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT

generatorOptions:
  disableNameSuffixHash: true
